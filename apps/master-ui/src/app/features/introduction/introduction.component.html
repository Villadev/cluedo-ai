<div class="p-4">
  <div class="flex justify-content-between align-items-center mb-4">
    <h1 class="text-3xl font-bold m-0">Introducció de la Partida</h1>
    @if (intro()) {
      <div class="flex gap-2">
        @if (!isPlaying()) {
          <p-button
            label="Escoltar narració"
            icon="pi pi-volume-up"
            severity="secondary"
            (click)="playIntroduction()">
          </p-button>
        } @else {
          <p-button
            label="Aturar narració"
            icon="pi pi-stop"
            severity="danger"
            (click)="stopIntroduction()">
          </p-button>
        }
      </div>
    }
  </div>

  @if (error()) {
    <div class="mb-4">
      <p-message severity="error" [text]="error() || ''"></p-message>
    </div>
  }

  @if (intro()) {
    <p-card header="Benvinguts" styleClass="p-fluid">
      <div class="intro-content" style="white-space: pre-wrap; font-style: italic; font-size: 1.1rem; line-height: 1.6;">
        {{ intro() }}
      </div>
    </p-card>
  }

  @if (loading()) {
    <div class="flex justify-content-center p-4">
      <i class="pi pi-spin pi-spinner" style="font-size: 2rem"></i>
    </div>
  }
</div>
