<header class="layout-topbar surface-card border-bottom-1 surface-border">
  <button
    pButton
    pRipple
    type="button"
    icon="pi pi-bars"
    class="p-button-text p-button-rounded"
    aria-label="Toggle menu"
    (click)="onMenuToggle()"
  ></button>

  <div class="layout-topbar-title">{{ appTitle }}</div>

  <div class="layout-topbar-actions">
    <button
      pButton
      pRipple
      type="button"
      icon="pi pi-user"
      class="p-button-text p-button-rounded"
      aria-label="User actions"
    ></button>
  </div>
</header>
