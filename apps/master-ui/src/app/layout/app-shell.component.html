<div class="drawer lg:drawer-open min-h-screen">
  <input id="master-shell-drawer" type="checkbox" class="drawer-toggle" />

  <div class="drawer-content flex flex-col">
    <div class="navbar border-b border-base-300 bg-base-100/90 backdrop-blur">
      <div class="mx-auto flex w-full max-w-7xl items-center px-4 sm:px-6 lg:px-8">
        <div class="flex-none lg:hidden">
          <label for="master-shell-drawer" aria-label="open sidebar" class="btn btn-square btn-ghost">
            ☰
          </label>
        </div>
        <div class="flex-1">
          <h1 class="text-lg font-semibold sm:text-xl">{{ subtitle() }}</h1>
        </div>
        <div class="flex-none">
          <button type="button" class="btn btn-sm btn-outline">Start Match</button>
        </div>
      </div>
    </div>

    <main class="mx-auto w-full max-w-7xl flex-1 px-4 py-6 sm:px-6 lg:px-8 lg:py-8">
      <ng-content />
    </main>
  </div>

  <div class="drawer-side z-40">
    <label for="master-shell-drawer" aria-label="close sidebar" class="drawer-overlay"></label>
    <aside class="min-h-full w-80 bg-base-100">
      <div class="border-b border-base-300 p-6">
        <p class="text-xs uppercase tracking-[0.2em] text-base-content/70">Cluedo AI</p>
        <h2 class="mt-2 text-xl font-bold">{{ title() }}</h2>
      </div>

      <ul class="menu gap-2 p-4">
        @for (item of navItems(); track item.label) {
          <li>
            <a [class.active]="item.active" class="text-base">
              <span>{{ item.icon }}</span>
              <span>{{ item.label }}</span>
            </a>
          </li>
        }
      </ul>
    </aside>
  </div>
</div>
