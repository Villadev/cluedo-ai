<section class="game-layout grid relative">
  <div class="col-12">
    <p-card header="Xat d'investigació">
      <div class="chat-list mb-3">
        @for (message of (chatMessages$ | async); track message.id) {
          <article class="chat-message" [class]="'chat-' + message.type">
            <p class="m-0 white-space-pre-wrap">{{ message.content }}</p>
            <small>{{ message.createdAt | date: 'shortTime' }}</small>
          </article>
        } @empty {
          <p class="text-500">Encara no hi ha missatges.</p>
        }
      </div>

      <form class="chat-input flex flex-column gap-2" [formGroup]="questionForm" (ngSubmit)="onSendQuestion()">
        <textarea
          pInputTextarea
          formControlName="question"
          placeholder="Escriu la teva pregunta d'investigació..."
          class="w-full"
          [rows]="3"
          [autoResize]="true"
          [disabled]="askedThisRound"></textarea>

        <div class="flex justify-content-end align-items-center gap-3">
          @if (askedThisRound) {
            <span class="text-orange-500 font-medium">Ja has enviat una pregunta en aquesta ronda.</span>
          }
          <button
            pButton
            type="submit"
            icon="pi pi-send"
            label="Enviar Pregunta"
            [disabled]="askedThisRound || questionForm.invalid"></button>
        </div>
      </form>
    </p-card>
  </div>

  <app-game-status-indicator [gameId]="gameId"></app-game-status-indicator>
</section>
