<div *ngIf="coartada" class="coartada-container mt-3 p-3 border-round bg-blue-50">
  <h4 class="text-blue-800 font-bold mb-2">Coartada</h4>

  <p class="mb-2">
    Dius que eres a <strong>{{ coartada.location }}</strong>
    entre les <strong>{{ coartada.timeStart }}</strong> i les <strong>{{ coartada.timeEnd }}</strong>.
  </p>

  <p *ngIf="coartada.witness !== 'ningú'" class="mb-2">
    Segons tu, <strong>{{ coartada.witness }}</strong> pot confirmar-ho.
  </p>

  <p *ngIf="coartada.witness === 'ningú'" class="mb-2 italic text-600">
    No hi ha cap testimoni que pugui confirmar-ho.
  </p>

  <p class="m-0">
    <span class="font-bold">Credibilitat:</span> {{ coartada.credibility }}
  </p>
</div>
